<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body>
  <div class="wrapper">

    <main class="main-content">
      <div class="banner"></div>
      <div class="page-body">
        {{ content }}
      </div>
    </main>

    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <div class="avatar-circle"></div>
          <h1 class="site-title">Chern Teh</h1>
          <p class="site-tagline">Quant Finance · Actuarial<br>Data Engineering</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">Projects</a>
          <a href="/about/" class="nav-link{% if page.url contains 'about' %} active{% endif %}">About Me</a>
        </nav>

        <div class="sidebar-social">
          <a href="https://github.com/chernteh" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://www.linkedin.com/in/chernteh" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
          <a href="mailto:chernteh@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
        </div>
      </div>
    </aside>

  </div>
</body>
</html>
