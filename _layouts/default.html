<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Apply saved theme before paint to avoid a flash of the wrong theme.
       Default is LIGHT for everyone (owner's choice, 2026-07-15) regardless of OS
       prefers-color-scheme; the toggle still saves an explicit override. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem('theme') !== 'dark') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>

  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="-r_w-yIfiBhMGpDt2ns3jsCXS9knImt9AfK2pcdc12Y" />

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/img/og-cover.png' | absolute_url }}">
  {% if page.layout == 'post' %}
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="Chern Teh">
  {% else %}
  <meta property="og:type" content="website">
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/img/og-cover.png' | absolute_url }}">

  <!-- JSON-LD: Person (homepage only) -->
  {% if page.url == '/' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Chern Teh",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://github.com/chernteh",
      "https://www.linkedin.com/in/chern-teh-59068325a/"
    ],
    "jobTitle": "Mathematics, Quantitative Finance, Actuarial Science, Data Science & Data Engineering Student",
    "alumniOf": {
      "@type": "CollegeOrUniversity",
      "name": "National University of Singapore"
    },
    "email": "chernteh@gmail.com"
  }
  </script>
  {% endif %}

  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
</head>
<body class="layout-{{ page.layout }}">
  <div class="wrapper">

    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-top">
          <div class="avatar-circle"></div>
          <p class="site-title">Chern Teh</p>
          <p class="site-tagline">Mathematics · Quant Finance<br>Actuarial · Data Engineering</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">About Me</a>
          <a href="/projects/" class="nav-link{% if page.url contains 'projects' %} active{% endif %}">Projects</a>
        </nav>

        <div class="sidebar-social">
          <a href="https://github.com/chernteh" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github" aria-hidden="true"></i></a>
          <a href="https://www.linkedin.com/in/chern-teh-59068325a/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin-in" aria-hidden="true"></i></a>
          <a href="mailto:chernteh@gmail.com" aria-label="Email"><i class="fas fa-envelope" aria-hidden="true"></i></a>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="banner"></div>
      <div class="page-body">
        {{ content }}
      </div>
    </main>

  </div>

  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark and light mode">
    <i class="fas fa-moon" aria-hidden="true"></i>
  </button>

  <script>
    (function () {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      function syncIcon() {
        var isLight = document.documentElement.getAttribute('data-theme') === 'light';
        btn.innerHTML = isLight
          ? '<i class="fas fa-sun" aria-hidden="true"></i>'
          : '<i class="fas fa-moon" aria-hidden="true"></i>';
      }
      syncIcon();
      btn.addEventListener('click', function () {
        var isLight = document.documentElement.getAttribute('data-theme') === 'light';
        if (isLight) {
          document.documentElement.removeAttribute('data-theme');
          try { localStorage.setItem('theme', 'dark'); } catch (e) {}
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          try { localStorage.setItem('theme', 'light'); } catch (e) {}
        }
        syncIcon();
      });
    })();
  </script>
</body>
</html>
