title: Chern Teh
description: Quant Finance · Actuarial · Data Engineering
url: "https://chernteh.github.io"

plugins:
  - jekyll-sitemap
timezone: Asia/Kuala_Lumpur
lang: en

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - HANDOVER.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - tools
